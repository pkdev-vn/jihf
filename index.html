<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CasioEmuWeb</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: 'Orbitron', monospace;
      }

      #canvas {
        position: absolute;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #000;
        z-index: 1;
      }

      /* Neon/Cyberpunk UI Styles */
      #web-tools {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 9999;
        background: linear-gradient(135deg, rgba(10, 10, 30, 0.95), rgba(20, 0, 40, 0.9));
        backdrop-filter: blur(10px);
        padding: 0;
        color: #00ffff;
        font-family: 'Orbitron', monospace;
        min-width: 10px;
        max-width: 450px;
        border: 2px solid #00ffff;
        border-radius: 15px;
        box-shadow: 
          0 0 20px rgba(0, 255, 255, 0.5),
          0 0 40px rgba(0, 255, 255, 0.3),
          inset 0 0 20px rgba(0, 255, 255, 0.1);
        animation: borderPulse 3s ease-in-out infinite;
      }

      @keyframes borderPulse {
        0%, 100% { 
          box-shadow: 
            0 0 20px rgba(0, 255, 255, 0.5),
            0 0 40px rgba(0, 255, 255, 0.3),
            inset 0 0 20px rgba(0, 255, 255, 0.1);
        }
        50% { 
          box-shadow: 
            0 0 30px rgba(0, 255, 255, 0.7),
            0 0 60px rgba(0, 255, 255, 0.5),
            inset 0 0 30px rgba(0, 255, 255, 0.2);
        }
      }

      #web-tools-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 15px;
        background: linear-gradient(90deg, rgba(0, 255, 255, 0.15), rgba(255, 0, 255, 0.15));
        border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 13px 13px 0 0;
      }

      #toolsTitle {
        font-size: 16px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: titleGlow 2s ease-in-out infinite;
      }

      @keyframes titleGlow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.8)); }
        50% { filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8)); }
      }

      #toggleToolsBtn {
        background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
        border: 1px solid #00ffff;
        color: #00ffff;
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 8px;
        font-family: 'Orbitron', monospace;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      }

      #toggleToolsBtn:hover {
        background: linear-gradient(135deg, rgba(0, 255, 255, 0.4), rgba(255, 0, 255, 0.4));
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        transform: scale(1.05);
      }

      #web-tools-body {
        padding: 15px;
        pointer-events: auto;
      }

      #breadcrumb {
        margin-bottom: 12px;
        font-size: 11px;
        color: #ff00ff;
        word-break: break-all;
        padding: 8px;
        background: rgba(255, 0, 255, 0.1);
        border-left: 3px solid #ff00ff;
        border-radius: 5px;
        text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
      }

      /* Button Styles */
      button {
        background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 200, 200, 0.2));
        border: 1px solid #00ffff;
        color: #00ffff;
        padding: 8px 14px;
        font-size: 11px;
        cursor: pointer;
        border-radius: 8px;
        font-family: 'Orbitron', monospace;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(0, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.5s, height 0.5s;
      }

      button:hover::before {
        width: 300px;
        height: 300px;
      }

      button:hover {
        background: linear-gradient(135deg, rgba(0, 255, 255, 0.4), rgba(0, 200, 200, 0.4));
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      #btnImportPackage {
        background: linear-gradient(135deg, rgba(255, 0, 255, 0.3), rgba(200, 0, 200, 0.3));
        border: 1px solid #ff00ff;
        color: #ff00ff;
        box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
      }

      #btnImportPackage::before {
        background: rgba(255, 0, 255, 0.3);
      }

      #btnImportPackage:hover {
        background: linear-gradient(135deg, rgba(255, 0, 255, 0.5), rgba(200, 0, 200, 0.5));
        box-shadow: 0 0 25px rgba(255, 0, 255, 0.7);
      }

      /* Input Styles */
      input[type="file"],
      input[type="text"],
      select,
      textarea {
        background: rgba(10, 10, 30, 0.6);
        border: 1px solid rgba(0, 255, 255, 0.3);
        color: #00ffff;
        padding: 8px;
        border-radius: 8px;
        font-family: 'Orbitron', monospace;
        font-size: 11px;
        transition: all 0.3s ease;
      }

      input[type="file"]:hover,
      input[type="text"]:hover,
      select:hover,
      textarea:hover {
        border-color: #00ffff;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      }

      input[type="file"]:focus,
      input[type="text"]:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #ff00ff;
        box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
      }

      #modelsList {
        width: 100%;
        display: block;
        margin-bottom: 10px;
        padding: 10px;
        background: rgba(10, 10, 30, 0.8);
        border: 1px solid rgba(0, 255, 255, 0.3);
        color: #00ffff;
        border-radius: 8px;
        min-height: 200px;
      }

      #modelsList option {
        padding: 6px;
        background: rgba(10, 10, 30, 0.9);
        border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        transition: all 0.2s ease;
      }

      #modelsList option:hover {
        background: rgba(0, 255, 255, 0.2);
        color: #ff00ff;
      }

      #fileEditor {
        width: 100%;
        height: 180px;
        margin-bottom: 10px;
        padding: 10px;
        background: rgba(10, 10, 30, 0.8);
        border: 1px solid rgba(0, 255, 255, 0.3);
        color: #00ffff;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        border-radius: 8px;
        resize: vertical;
      }

      #web-tools-msg {
        min-height: 20px;
        font-size: 11px;
        color: #00ffff;
        padding: 8px;
        background: rgba(0, 255, 255, 0.05);
        border-radius: 5px;
        margin-top: 10px;
        text-align: center;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        animation: msgGlow 2s ease-in-out infinite;
      }

      @keyframes msgGlow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }

      /* Loading Animation */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loading::after {
        content: '⚡';
        display: inline-block;
        animation: spin 1s linear infinite;
        margin-left: 5px;
        color: #ff00ff;
      }

      /* Flex layouts */
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .upload-row {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
        align-items: center;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(10, 10, 30, 0.5);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #00ffff, #ff00ff);
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #ff00ff, #00ffff);
      }

      /* Status colors */
      .status-success { color: #00ff00; text-shadow: 0 0 10px rgba(0, 255, 0, 0.8); }
      .status-error { color: #ff0000; text-shadow: 0 0 10px rgba(255, 0, 0, 0.8); }
      .status-warning { color: #ffff00; text-shadow: 0 0 10px rgba(255, 255, 0, 0.8); }
      .status-info { color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.8); }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    
    <div id="web-tools">
      <div id="web-tools-header">
        <strong id="toolsTitle">File Manager</strong>
        <button id="toggleToolsBtn">▲</button>
      </div>

      <div id="web-tools-body" style="pointer-events:auto;">
        <div id="breadcrumb">/ models</div>
        
        <div class="btn-row">
          <button id="upBtn">⬆ Up</button>
          <button id="openBtn">📂 Open</button>
          <button id="newFolderBtn">➕ New</button>
          <button id="renameBtn">✏️ Rename</button>
          <button id="deleteBtn">🗑️ Delete</button>
          <button id="downloadBtn">💾 Save</button>
        </div>

        <div class="upload-row">
          <input id="uploadCurrent" type="file" multiple style="flex:1;" />
          <input id="packageInput" type="file" accept=".package,.zip,.tar.gz,.tar" style="display:none;" />
          <button id="btnImportPackage">➕ Add File</button>
          <button id="btnExtractPackage">📦 Extract</button>
        </div>

        <div class="btn-row">
          <input id="uploadFolder" type="file" webkitdirectory directory multiple style="display:none;" />
          <button id="btnUploadFolder">📁 Folder</button>
          
          <input id="uploadModelsFolder" type="file" webkitdirectory directory multiple style="display:none;" />
          <button id="btnUploadModels">🎮 Models</button>
        </div>

        <select id="modelsList" size="10"></select>
        <textarea id="fileEditor" style="display:none;"></textarea>
        <div id="web-tools-msg">Ready ⚡</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.7.57/dist/zip.min.js"></script>
    <script>
      // Throttle the wasm event loop to let the browser render (16ms ~ 60fps)
      var originalSetTimeout = window.setTimeout;
      var lastFrameTime = performance.now();
      window.setTimeout = function(callback, delay) {
        if (delay === 0) {
          var now = performance.now();
          var timeSinceLastFrame = now - lastFrameTime;
          if (timeSinceLastFrame < 16) {
            delay = Math.max(1, 16 - timeSinceLastFrame);
          }
          lastFrameTime = now;
        }
        return originalSetTimeout(callback, delay);
      };

     async function fetchAndRestoreFileSync(url, targetPath) {
        try {
          const res = await fetch(url);

          if (!res.ok) {
            console.warn('Fetch failed:', url, res.status);
            return false;
          }

          const buffer = new Uint8Array(
            await res.arrayBuffer()
          );

          const fs = getFs();

          if (!fs) {
            console.warn('FS unavailable');
            return false;
          }

          // tạo folder nếu chưa có
          const parts = targetPath.split('/').filter(Boolean);

          let dir = '';

          for (let i = 0; i < parts.length - 1; i++) {
            dir += '/' + parts[i];

            try {
              fs.mkdir(dir);
            } catch (e) {}
          }

          fs.writeFile(targetPath, buffer);

          console.log('✅ Restored:', targetPath);

          return true;

        } catch (e) {
          console.error('Restore failed:', url, e);
          return false;
        }
      }
      
      var Module = {
        canvas: document.getElementById("canvas"),
        locateFile: function (path) {
          return path;
        },
        preRun: [],
        onRuntimeInitialized: undefined
      };

      Module._WebSyncFS = function() {
        try { syncPersistentFs('native-request'); } catch(e) { console.warn('WebSyncFS shim error', e); }
      };

      function initializePersistentFsPreRun() {
        console.log('[preRun] Initializing persistent filesystem');
        if (typeof FS === 'undefined' || typeof IDBFS === 'undefined') {
          console.warn('[preRun] FS or IDBFS not available');
          return;
        }

        const dependencyId = 'web-idbfs-init';
        if (typeof addRunDependency === 'function') {
          addRunDependency(dependencyId);
        }

        try {
          try { FS.mkdir('/models'); } catch (e) {}
          try { FS.mount(IDBFS, {}, '/models'); } catch (e) {}

          try { FS.mkdir('/locales'); } catch (e) {}
          try { FS.mount(IDBFS, {}, '/locales'); } catch (e) {}

          try { FS.mkdir('/tmp'); } catch (e) {}

          FS.syncfs(true, function(err) {
            if (err) {
              console.error('[preRun] syncfs(true) failed:', err);
              if (typeof removeRunDependency === 'function') {
                removeRunDependency(dependencyId);
              }
              return;
            }

            Promise.resolve(ensureBootstrapAssets())
              .catch(function(bootstrapErr) {
                console.error('[preRun] ensureBootstrapAssets failed:', bootstrapErr);
              })
              .finally(function() {
                if (typeof removeRunDependency === 'function') {
                  removeRunDependency(dependencyId);
                }
              });
          });
        } catch (e) {
          console.error('[preRun] Persistent filesystem init failed:', e);
          if (typeof removeRunDependency === 'function') {
            removeRunDependency(dependencyId);
          }
        }
      }

      Module.preRun.push(initializePersistentFsPreRun);

      Module.safeInvokeImport = function(tempPath) {
        var tries = 0;
        function attempt() {
          try {
            if (typeof Module._OnEmscriptenImportSelected === 'function') {
              var invoke = function() {
                try {
                  if (typeof Module.allocateUTF8 === 'function') {
                    var ptr = Module.allocateUTF8(tempPath);
                    Module._OnEmscriptenImportSelected(ptr);
                  } else {
                    Module._OnEmscriptenImportSelected(tempPath);
                  }
                } catch (invokeErr) {
                  console.error('[safeInvokeImport] invoke error', invokeErr);
                }
              };
              setTimeout(invoke, 0);
              return;
            }
          } catch(e) { console.error('[safeInvokeImport] call error', e); }
          tries++;
          if (tries < 60) {
            setTimeout(attempt, 200);
          } else {
            console.error('[safeInvokeImport] Failed to invoke wasm import callback for', tempPath);
          }
        }
        attempt();
      };

      function getFs() {
        return typeof FS !== 'undefined' ? FS : null;
      }

      function callExportedFunction(name, args) {
        try {
          const fn = Module && Module[name];
          if (typeof fn === 'function') {
            fn.apply(Module, args || []);
            return true;
          }
        } catch (e) {}
        return false;
      }

      const webFsSyncState = {
        inFlight: false,
        pending: false,
        timer: null,
      };

      function syncPersistentFs(reason) {
        const fs = getFs();
        if (!fs || typeof fs.syncfs !== 'function') return;
        if (webFsSyncState.inFlight) {
          webFsSyncState.pending = true;
          return;
        }
        webFsSyncState.inFlight = true;
        fs.syncfs(false, function(err) {
          if (err) {
            console.error('[Web] syncfs(false) failed (' + reason + '):', err);
          } else {
            console.log('[Web] syncfs(false) complete (' + reason + ')');
          }
          webFsSyncState.inFlight = false;
          if (webFsSyncState.pending) {
            webFsSyncState.pending = false;
            syncPersistentFs('pending');
          }
        });
      }

      function startPersistentFsAutosave() {
        if (webFsSyncState.timer) return;
        webFsSyncState.timer = setInterval(function() {
          syncPersistentFs('autosave-5s');
        }, 5000);
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState !== 'visible') {
            syncPersistentFs('visibility-hidden');
          }
        });
        window.addEventListener('pagehide', function() {
          syncPersistentFs('pagehide');
        });
        window.addEventListener('beforeunload', function() {
          syncPersistentFs('beforeunload');
        });
      }

      function setStatus(message, type) {
        const msgEl = document.getElementById('web-tools-msg');
        if (!msgEl) return;
        msgEl.textContent = message;
        msgEl.className = '';
        if (type === 'success') msgEl.classList.add('status-success');
        else if (type === 'error') msgEl.classList.add('status-error');
        else if (type === 'warning') msgEl.classList.add('status-warning');
        else msgEl.classList.add('status-info');
        
        if (type === 'success' || type === 'error') {
          msgEl.classList.add('loading');
        }
      }

      let currentDir = '/models';

      function joinPath(base, name) {
        if (!base || base === '/') return '/' + name.replace(/^\/+/, '');
        return (base.endsWith('/') ? base.slice(0, -1) : base) + '/' + name.replace(/^\/+/, '');
      }

      function currentSelectionPath() {
        const sel = document.getElementById('modelsList');
        if (!sel || !sel.value) return null;
        const name = sel.value.endsWith('/') ? sel.value.slice(0, -1) : sel.value;
        return joinPath(currentDir, name);
      }

      function updateBreadcrumb() {
        const breadcrumb = document.getElementById('breadcrumb');
        if (breadcrumb) breadcrumb.textContent = currentDir;
      }

      function populateModelsList() {
        const fs = getFs();
        const sel = document.getElementById('modelsList');
        if (!fs || !sel) return;
        sel.innerHTML = '';
        updateBreadcrumb();
        try {
          const entries = fs.readdir(currentDir).filter(function(name) { return name !== '.' && name !== '..'; });
          entries.sort(function(a, b) {
            try {
              const aStat = fs.stat(joinPath(currentDir, a));
              const bStat = fs.stat(joinPath(currentDir, b));
              const aDir = (aStat.mode & 0o170000) === 0o040000;
              const bDir = (bStat.mode & 0o170000) === 0o040000;
              if (aDir !== bDir) return aDir ? -1 : 1;
            } catch (e) {}
            return a.localeCompare(b);
          });
          for (const entry of entries) {
            try {
              const stat = fs.stat(joinPath(currentDir, entry));
              const opt = document.createElement('option');
              opt.value = (stat.mode & 0o170000) === 0o040000 ? entry + '/' : entry;
              opt.textContent = opt.value;
              sel.appendChild(opt);
            } catch (e) {}
          }
        } catch (e) {
          console.warn('populateModelsList error', e);
        }
      }

      async function uploadFiles(files) {
        const fs = getFs();
        if (!fs) return;
        setStatus('⚡ Uploading ' + files.length + ' file(s)...', 'info');
        let fileCount = 0;
        for (const f of files) {
          let rel = f.webkitRelativePath || f.name;
          if (f.webkitRelativePath) {
            const parts = rel.split('/').filter(Boolean);
            rel = parts.length > 1 ? parts.slice(1).join('/') : (parts[0] || f.name);
          }
          if (rel.startsWith('./')) rel = rel.slice(2);
          const parts = rel.split('/').filter(Boolean);
          let dir = '/models';
          for (let i = 0; i < parts.length - 1; ++i) {
            dir = joinPath(dir, parts[i]);
            try { fs.mkdir(dir); } catch(e) {}
          }
          const outPath = joinPath('/models', rel);
          try {
            const buf = new Uint8Array(await f.arrayBuffer());
            fs.writeFile(outPath, buf);
            fileCount++;
          } catch(e) {
            console.error('Write error for ' + outPath + ':', e);
          }
        }
        syncPersistentFs('file-manager-upload-models');
        setStatus('✅ Uploaded ' + fileCount + ' file(s)', 'success');
        populateModelsList();
        callExportedFunction('_WebReloadStartupUi', []);
      }

      async function uploadFilesToCurrent(files, preserveStructure, includeTopFolder) {
        const fs = getFs();
        if (!fs) return;
        setStatus('⚡ Uploading ' + files.length + ' file(s)...', 'info');
        let fileCount = 0;
        for (const f of files) {
          let rel = preserveStructure ? (f.webkitRelativePath || f.name) : f.name;
          if (preserveStructure) {
            const parts = rel.split('/').filter(Boolean);
            if (includeTopFolder) {
              rel = parts.join('/') || f.name;
            } else if (parts.length > 1) {
              rel = parts.slice(1).join('/');
            } else {
              rel = parts[0] || f.name;
            }
          }
          if (rel.startsWith('./')) rel = rel.slice(2);
          const parts = rel.split('/').filter(Boolean);
          let dir = currentDir;
          for (let i = 0; i < parts.length - 1; ++i) {
            dir = joinPath(dir, parts[i]);
            try { fs.mkdir(dir); } catch(e) {}
          }
          const outPath = joinPath(currentDir, rel);
          try {
            const buf = new Uint8Array(await f.arrayBuffer());
            fs.writeFile(outPath, buf);
            fileCount++;
          } catch(e) {
            console.error('Write error for ' + outPath + ':', e);
          }
        }
        syncPersistentFs('file-manager-upload-current');
        setStatus('✅ Uploaded ' + fileCount + ' file(s)', 'success');
        populateModelsList();
        callExportedFunction('_WebReloadStartupUi', []);
      }

      function rmTree(path) {
        const fs = getFs();
        if (!fs) return;
        try {
          const items = fs.readdir(path);
          for (const it of items) {
            if (it === '.' || it === '..') continue;
            const p = joinPath(path, it);
            const stat = fs.stat(p);
            if (stat && (stat.mode & 0o170000) === 0o040000) {
              rmTree(p);
            } else {
              try { fs.unlink(p); } catch(e) { console.warn(e); }
            }
          }
          fs.rmdir(path);
        } catch(e) {
          console.warn('rmTree error', e);
        }
      }

      function goUpDirectory() {
        if (currentDir === '/' || currentDir === '/models') {
          currentDir = '/';
        } else {
          const parts = currentDir.split('/').filter(Boolean);
          parts.pop();
          currentDir = '/' + parts.join('/');
        }
        populateModelsList();
      }

      function openSelected() {
        const fs = getFs();
        const path = currentSelectionPath();
        if (!fs || !path) return;
        try {
          const stat = fs.stat(path);
          if ((stat.mode & 0o170000) === 0o040000) {
            currentDir = path;
            populateModelsList();
          } else {
            editSelected();
          }
        } catch (e) {
          setStatus('❌ Open failed: ' + e, 'error');
        }
      }

      function createNewFolder() {
        const fs = getFs();
        const name = prompt('📁 Folder name:');
        if (!fs || !name) return;
        try {
          fs.mkdir(joinPath(currentDir, name));
          syncPersistentFs('file-manager-create-folder');
          populateModelsList();
          setStatus('✅ Created folder: ' + name, 'success');

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';

        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function writeString(buffer, offset, str, length) {
        for (let i = 0; i < length; i++) {
          buffer[offset + i] = i < str.length ? str.charCodeAt(i) : 0;
        }
      }

      function writeOctal(buffer, offset, value, length) {
        const text = value.toString(8).padStart(length - 1, '0') + '\0';
        writeString(buffer, offset, text, length);
      }

      function makeTarHeader(name, size) {
        const header = new Uint8Array(512);
        writeString(header, 0, name, 100);
        writeOctal(header, 100, 0o644, 8);
        writeOctal(header, 108, 0, 8);
        writeOctal(header, 116, 0, 8);
        writeOctal(header, 124, size, 12);
        writeOctal(header, 136, Math.floor(Date.now() / 1000), 12);
        for (let i = 148; i < 156; i++) header[i] = 32;
        header[156] = 0;
        writeString(header, 257, 'ustar\0', 8);
        writeString(header, 263, '00', 2);
        writeString(header, 265, 'root', 32);
        writeString(header, 297, 'root', 32);
        let sum = 0;
        for (let i = 0; i < 512; i++) sum += header[i];
        writeOctal(header, 148, sum, 8);
        return header;
      }

      function padTo512(data) {
        if (data.length % 512 === 0) return data;
        const pad = 512 - (data.length % 512);
        const out = new Uint8Array(data.length + pad);
        out.set(data, 0);
        return out;
      }

      function collectFiles(dir, baseName, list) {
        const fs = getFs();
        if (!fs) return;
        const items = fs.readdir(dir);
        for (const name of items) {
          if (name === '.' || name === '..') continue;
          const fullPath = dir + '/' + name;
          const stat = fs.stat(fullPath);
          const entryName = baseName ? baseName + '/' + name : name;
          if (stat && (stat.mode & 0o170000) === 0o040000) {
            collectFiles(fullPath, entryName, list);
          } else {
            list.push({ path: fullPath, name: entryName, size: stat.size });
          }
        }
      }

      function createTarFromDirectory(dirPath, rootName) {
        const fs = getFs();
        const files = [];
        collectFiles(dirPath, '', files);
        const parts = [];
        for (const file of files) {
          const header = makeTarHeader(rootName + '/' + file.name, file.size);
          parts.push(header);
          const data = fs.readFile(file.path, { encoding: 'binary' });
          parts.push(padTo512(data));
        }
        parts.push(new Uint8Array(512));
        parts.push(new Uint8Array(512));
        const totalSize = parts.reduce((sum, part) => sum + part.length, 0);
        const tar = new Uint8Array(totalSize);
        let offset = 0;
        for (const part of parts) {
          tar.set(part, offset);
          offset += part.length;
        }
        return new Blob([tar], { type: 'application/x-tar' });
      }

      async function ensureBootstrapAssets() {
        const fs = getFs(); 
        if (!fs) { 
          console.error('[ensureBootstrapAssets] FS not available'); 
          return false; 
        }
        let restored = false;

        async function ensureFile(targetPath, candidates, label) {
          try {
            if (fs.analyzePath(targetPath).exists) {
              return false;
            }
          } catch (e) {}
          for (const candidate of candidates) {
            console.log('[ensureBootstrapAssets] Fetching ' + label + ' from ' + candidate);
            if (await fetchAndRestoreFileSync(candidate, targetPath)) {
              console.log('[ensureBootstrapAssets] Restored ' + label + ' to ' + targetPath);
              return true;
            }
          }
          console.warn('[ensureBootstrapAssets] Missing ' + label + ' and could not restore it');
          return false;
        }

        restored = await ensureFile('/locales/roms.db', ['roms.db', './roms.db', 'build-web/CasioEmuMsvc/roms.db'], 'roms.db') || restored;
        restored = await ensureFile('/locales/CONSOLA.TTF', ['CONSOLA.TTF', './CONSOLA.TTF', 'build-web/CasioEmuMsvc/CONSOLA.TTF'], 'CONSOLA.TTF') || restored;

        try {
          await loadLocales();
        } catch (e) {
          console.warn('[ensureBootstrapAssets] Locale restore failed', e);
        }

        syncPersistentFs('ensure-bootstrap-assets');

        return restored;
      }

      async function loadLocales() {
        const fs = getFs();
        if (!fs) return;
        setStatus('⚡ Loading locales...', 'info');
        const names = ['en_US.lc','ja_JP.lc','vi_VN.lc','zh_CN.lc'];
        const bases = ['locales/','./locales/','../locales/'];
        try { fs.mkdir('/locales'); } catch(e) {}
        for (const name of names) {
          let found = false;
          for (const base of bases) {
            try {
              const res = await fetch(base + name);
              if (res.ok) {
                const data = new Uint8Array(await res.arrayBuffer());
                try { fs.writeFile('/locales/' + name, data); } catch(e) {}
                found = true;
                console.log('Loaded locale:', base + name);
                break;
              }
            } catch(e) {}
          }
          if (!found) console.warn('Locale not found:', name);
        }
        syncPersistentFs('load-locales');
        setStatus('✅ Locales loaded', 'success');
      }

      // ============================================
      // EXTRACT PACKAGE FILE
      // ============================================
      async function extractPackageFile(packagePath) {
        const fs = getFs();
        if (!fs) {
          setStatus('❌ FS unavailable', 'error');
          return;
        }

        try {
          setStatus('🔍 Reading package file...', 'info');
          
          // Read the package file
          const data = fs.readFile(packagePath, { encoding: 'binary' });
          const buffer = new Uint8Array(data.length);
          for (let i = 0; i < data.length; i++) {
            buffer[i] = data.charCodeAt(i);
          }
          
          const view = new Uint8Array(buffer);
          const isZip = (view[0] === 0x50 && view[1] === 0x4B);
          
          console.log('Extract package - IsZip:', isZip, 'Size:', buffer.length);
          
          if (!isZip) {
            setStatus('⚠️ Not a valid ZIP file', 'warning');
            return;
          }
          
          // Create a File object from the buffer
          const fileName = packagePath.split('/').pop();
          const file = new File([buffer], fileName, { type: 'application/zip' });
          
          // Extract using handleZipImport
          await handleZipImport(file);
          
        } catch (e) {
          console.error('Extract error:', e);
          setStatus('❌ Extract failed: ' + e.message, 'error');
        }
      }

      // ============================================
      // IMPROVED PACKAGE IMPORT WITH SMART PASSWORD DETECTION
      // ============================================
      async function handlePackageImport(file) {
  if (!file) return;

  setStatus('🔍 Opening package...', 'info');
  console.log('Package file:', file.name, file.type, file.size);

  try {
    // Try to detect file format
    const buffer = await file.arrayBuffer();
    const view = new Uint8Array(buffer);
    
    // Check if ZIP (0x504B0304 or 0x504B0303 for split archives)
    const isZip = (view[0] === 0x50 && view[1] === 0x4B && (view[2] === 0x03 || view[2] === 0x05 || view[2] === 0x07));
    
    // Check if TAR (magic number ustar at offset 257)
    const isTar = buffer.byteLength > 260 && 
                  view[257] === 0x75 && view[258] === 0x73 && 
                  view[259] === 0x74 && view[260] === 0x61;

    console.log('File analysis - IsZip:', isZip, 'IsTar:', isTar, 'Size:', buffer.byteLength);
    console.log('First 4 bytes:', view[0].toString(16), view[1].toString(16), view[2].toString(16), view[3].toString(16));

    if (isZip) {
      // Handle as ZIP
      await handleZipImport(file);
    } else if (isTar) {
      setStatus('⚠️ TAR format detected - importing...', 'warning');
      const packageFiles = [new File([buffer], file.name)];
      await uploadFiles(packageFiles);
    } else {
      // Try to force open as ZIP anyway (might be encrypted or have unusual header)
      console.log('Attempting to open as ZIP despite unusual header...');
      try {
        await handleZipImport(file);
      } catch (zipErr) {
        console.warn('ZIP force open failed:', zipErr.message);
        // Fall back to treating as binary package file
        console.warn('Treating as binary package file');
        const packageFiles = [new File([buffer], file.name)];
        setStatus(`⚡ Importing package: ${file.name}`, 'info');
        await uploadFiles(packageFiles);
        setStatus(`✅ Imported: ${file.name}`, 'success');
      }
    }

  } catch (e) {
    console.error('Package import error:', e);
    setStatus('❌ Import failed: ' + (e.message || 'Unknown error'), 'error');
  }
}

async function handleZipImport(file) {
  let password = null;

  async function openZip(pass) {
    const reader = new zip.ZipReader(
      new zip.BlobReader(file)
    );
    const entries = await reader.getEntries();
    return { reader, entries, password: pass };
  }

  let zipData;
  let attemptCount = 0;
  const maxAttempts = 3;

  try {
    zipData = await openZip();
  } catch (e) {
    console.log('ZIP encrypted or invalid:', e.message);

    while (attemptCount < maxAttempts) {
      password = prompt(`🔐 Enter password (${attemptCount + 1}/${maxAttempts}):`);

      if (password == null) {
        setStatus('❌ Cancelled', 'warning');
        return;
      }

      password = password.trim();
      if (password === '') {
        setStatus('❌ Password required', 'error');
        attemptCount++;
        continue;
      }

      try {
        zipData = await openZip(password);
        console.log('✅ Password OK');
        break;
      } catch (err) {
        console.error('Wrong password:', err.message);
        attemptCount++;
        if (attemptCount < maxAttempts) {
          setStatus(`⚠️ Wrong password (${maxAttempts - attemptCount} left)`, 'warning');
        } else {
          setStatus('❌ Too many attempts', 'error');
          return;
        }
      }
    }

    if (!zipData) return;
  }

  const { reader, entries } = zipData;

  if (!entries || entries.length === 0) {
    setStatus('❌ Package empty', 'error');
    await reader.close();
    return;
  }

  const extractedFiles = [];
  let successCount = 0, errorCount = 0;

  for (const entry of entries) {
    if (entry.directory) continue;

    try {
      const blob = await entry.getData(
        new zip.BlobWriter(),
        { password: password }
      );
      extractedFiles.push(new File([blob], entry.filename));
      successCount++;
    } catch (e) {
      console.error('Extract error:', entry.filename, e.message);
      errorCount++;
    }
  }

  await reader.close();

  if (extractedFiles.length > 0) {
    setStatus(`⚡ Importing ${successCount} files...`, 'info');
    await uploadFiles(extractedFiles);
    
    if (errorCount > 0) {
      setStatus(`⚠️ Imported ${successCount} (${errorCount} failed)`, 'warning');
    } else {
      setStatus(`✅ Imported ${successCount} files`, 'success');
    }
  } else {
    setStatus('❌ No files extracted', 'error');
  }
}
